<style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, #f0f3ff 25%, #e2e8f8 50%, #f0f3ff 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-pulse-ring::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            background-color: #ff6b35;
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
    </style>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const messages = [
                "Scanning recent transactions...",
                "Calculating reward maximization...",
                "Optimizing for low interest...",
                "Fetching Axis Bank exclusive offers...",
                "Matching travel preferences..."
            ];
            let index = 0;
            const textElement = document.querySelector('p.animate-pulse');
            
            setInterval(() => {
                index = (index + 1) % messages.length;
                textElement.style.opacity = '0';
                setTimeout(() => {
                    textElement.textContent = messages[index];
                    textElement.style.opacity = '1';
                }, 500);
            }, 3000);
        });
    </script>
